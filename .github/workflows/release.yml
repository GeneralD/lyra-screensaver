name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        # -derivedDataPath (not SYMROOT): relocating output via SYMROOT desyncs
        # the inter-package module search paths for SwiftPM deps, so a transitive
        # dep (combine-schedulers) fails to find its own dep (ConcurrencyExtras)
        # with "no such module". -derivedDataPath relocates the whole build tree
        # coherently. -skipMacroValidation trusts lyra's papyrus macro plugin.
        run: |
          # MARKETING_VERSION from version.txt keeps the bundle's
          # CFBundleShortVersionString in sync with the release/tag/cask version
          # (version.txt is the single source of truth).
          xcodebuild -project LyraScreenSaver.xcodeproj \
            -scheme LyraScreenSaver \
            -configuration Release \
            -skipMacroValidation \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            MARKETING_VERSION=${{ steps.version.outputs.version }}

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="LyraScreenSaver-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            build/Build/Products/Release/LyraScreenSaver.saver "$ARCHIVE"
          SHA=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="${{ steps.package.outputs.archive }}"
          # Tag/release only after a successful build. Force-move the tag to the
          # built commit so a prior failed run that left it elsewhere self-heals.
          git tag -f "$TAG"
          git push -f origin "refs/tags/$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE" --clobber
          else
            gh release create "$TAG" "$ARCHIVE" --title "$TAG" --generate-notes
          fi

      - name: Update Homebrew cask
        uses: actions/github-script@v7
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
          CASK_VERSION: ${{ steps.version.outputs.version }}
          CASK_TAG: ${{ steps.version.outputs.tag }}
          CASK_SHA256: ${{ steps.package.outputs.sha256 }}
        with:
          github-token: ${{ secrets.HOMEBREW_PAT }}
          script: |
            const version = process.env.CASK_VERSION;
            const tag = process.env.CASK_TAG;
            const sha256 = process.env.CASK_SHA256;
            const owner = 'GeneralD';
            const tapRepo = 'homebrew-tap';
            const caskPath = 'Casks/lyra-screensaver.rb';

            const url = `https://github.com/GeneralD/lyra-screensaver/releases/download/${tag}/LyraScreenSaver-${version}.zip`;

            const caskContent = `cask "lyra-screensaver" do
              version "${version}"
              sha256 "${sha256}"

              url "${url}"
              name "Lyra Screen Saver"
              desc "macOS screensaver that plays lyra's video wallpaper"
              homepage "https://github.com/GeneralD/lyra-screensaver"

              depends_on formula: "generald/tap/lyra"

              screen_saver "LyraScreenSaver.saver"
            end
            `;

            let existingSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo: tapRepo, path: caskPath,
              });
              existingSha = data.sha;
            } catch (e) {
              existingSha = undefined;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo: tapRepo,
              path: caskPath,
              message: `Update lyra-screensaver to ${version}`,
              content: Buffer.from(caskContent).toString('base64'),
              sha: existingSha,
              branch: 'master',
            });

            console.log(`Updated cask to ${version}`);
